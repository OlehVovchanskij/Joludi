services:
  postgres:
    image: postgres:16-alpine
    container_name: joludi-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-joludi}
      - POSTGRES_USER=${POSTGRES_USER:-joludi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-joludi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: joludi-backend
    depends_on:
      - postgres
    command: >
      sh -c "if [ -f alembic.ini ]; then alembic upgrade head; else echo 'alembic.ini not found, skipping migrations'; fi && uvicorn app:app --host 0.0.0.0 --port 8501 --reload"
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://joludi:joludi@postgres:5432/joludi}
      - HISTORY_ENABLED=${HISTORY_ENABLED:-true}
      - HISTORY_RETENTION_DAYS=${HISTORY_RETENTION_DAYS:-30}
      - HISTORY_MAX_ROWS=${HISTORY_MAX_ROWS:-20000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Joludi}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://localhost:3000}
      - EMAIL_VERIFICATION_TOKEN_TTL_MINUTES=${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-1440}
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: joludi-frontend
    depends_on:
      - backend
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-http://localhost:8501}
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
