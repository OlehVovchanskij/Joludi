services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-joludi}
      - POSTGRES_USER=${POSTGRES_USER:-joludi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-joludi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-joludi} -d ${POSTGRES_DB:-joludi}",
        ]
      interval: 2s
      timeout: 5s
      retries: 10

  drone-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "if [ -f alembic.ini ]; then alembic upgrade head; else echo 'alembic.ini not found, skipping migrations'; fi && uvicorn app:app --host 0.0.0.0 --port 8501 --reload"
    ports:
      - "8501:8501"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://joludi:joludi@postgres:5432/joludi}
      - HISTORY_ENABLED=${HISTORY_ENABLED:-true}
      - HISTORY_RETENTION_DAYS=${HISTORY_RETENTION_DAYS:-30}
      - HISTORY_MAX_ROWS=${HISTORY_MAX_ROWS:-20000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Joludi_app}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-true}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://localhost:3000}
      - EMAIL_VERIFICATION_TOKEN_TTL_MINUTES=${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-1440}
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data

volumes:
  postgres_data:
